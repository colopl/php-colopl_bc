name: Build and release binaries for PIE

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  CreateDraftRelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: 'true'
          ref: ${{ github.ref }}
      - name: Create draft release from tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --draft --notes-from-tag
  AddPieBinaries:
    needs: [ CreateDraftRelease ]
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system:
          - ubuntu-latest
          - macos-latest
        php-versions:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
        zts-mode:
          - ts
          - nts
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: ${{ matrix.php-versions }}
        env:
          phpts: ${{ matrix.zts-mode }}
      - name: Build and release
        uses: php/pie-ext-binary-builder@5298761950f63c7e9565ed7004e922b346e4386c # 0.0.3
        with:
          release-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          configure-flags: '--enable-colopl_bc'
          build-path: 'ext'
  GetWindowsExtensionMatrix:
    needs: [ CreateDraftRelease ]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extension-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Get the extension matrix
        id: extension-matrix
        uses: php/php-windows-builder/extension-matrix@e0e01747e758fc325cb6591b904589b11a0ea4c8 # v1.7.0
        with:
          php-version-list: '8.1,8.2,8.3,8.4,8.5'
  BuildWindows:
    needs: GetWindowsExtensionMatrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.GetWindowsExtensionMatrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      # Workaround: php-windows-builder reads config.w32 from repo root,
      # but our extension source is in ext/. Copy ext/* to root so the
      # action can find config.w32 and the source files.
      - name: Copy extension source to root
        shell: pwsh
        run: Copy-Item -Path ext\* -Destination . -Recurse -Force
      - name: Build the extension
        uses: php/php-windows-builder/extension@e0e01747e758fc325cb6591b904589b11a0ea4c8 # v1.7.0
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
  ReleaseWindows:
    runs-on: ubuntu-latest
    needs: BuildWindows
    permissions:
      contents: write
    steps:
      - name: Upload artifact to the release
        uses: php/php-windows-builder/release@e0e01747e758fc325cb6591b904589b11a0ea4c8 # v1.7.0
        with:
          release: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
  publish-release:
    needs: [ AddPieBinaries, ReleaseWindows ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
